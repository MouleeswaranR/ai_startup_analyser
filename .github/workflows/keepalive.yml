name: Keep Render Service Alive

on:
  schedule:
    - cron: "*/10 * * * *" # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Check
        run: |
          echo "Pinging https://ai-startup-api.onrender.com/health to keep it awake..."
          curl -sSf https://ai-startup-api.onrender.com/health || echo "Ping failed or returned non-200"
